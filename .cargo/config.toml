# Enable ARMv8 Crypto Extensions in RustCrypto on Apple Silicon / aarch64.
#
# The `aes` (0.8.x) and `polyval` crates gate their hardware backends behind
# these cfgs (with runtime CPU detection, so non-crypto ARM cores still work);
# without them every AES block and GHASH runs in constant-time *software* —
# measured on an M-series host: AES-CTR 1.7 → 42.7 Gbps, AES-GCM 1.2 → 9.7
# Gbps for 1316-byte payloads once enabled.
[target.'cfg(target_arch = "aarch64")']
rustflags = ["--cfg", "aes_armv8", "--cfg", "polyval_armv8"]
